services:
  - type: web
    name: game-codes-api
    runtime: python
    plan: free
    buildCommand: pip install -e .
    startCommand: python run.py
    envVars:
      - key: API_TOKEN
        value: your-secure-token
      - key: DATA_FILE
        value: /data/data.json
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
